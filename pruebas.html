<head>
<meta charset="UTF-8">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0c10;--surface:#13151c;--surface2:#1c1f2a;--border:#252836;--text:#eef0f6;--muted:#6b7280;--accent:#f0b84a;--ok:#22c55e;--danger:#ef4444;--warn:#f59e0b;--info:#3b82f6}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:20px 16px 60px;max-width:700px;margin:0 auto}
.header{text-align:center;margin-bottom:28px}
.header h1{font-family:'Sora',sans-serif;font-size:1.5rem;color:var(--accent)}
.header p{font-size:0.78rem;color:var(--muted);margin-top:4px}
.app-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:12px;overflow:hidden}
.app-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.app-head.collapsed{border-bottom:none}
.app-title{display:flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:700;font-size:0.95rem}
.app-badge{font-size:0.68rem;padding:3px 9px;border-radius:999px;font-weight:700}
.badge-ok{background:rgba(34,197,94,.15);color:var(--ok)}
.badge-warn{background:rgba(245,158,11,.15);color:var(--warn)}
.badge-danger{background:rgba(239,68,68,.15);color:var(--danger)}
.chevron{color:var(--muted);transition:transform .2s;font-size:0.9rem}
.app-body{padding:8px 0}
.prueba-row{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.prueba-row:last-child{border-bottom:none}
.prueba-row:hover{background:var(--surface2)}
.check-box{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.prueba-row.done .check-box{background:var(--ok);border-color:var(--ok)}
.prueba-row.done .prueba-label{text-decoration:line-through;color:var(--muted)}
.prueba-info{flex:1}
.prueba-label{font-size:0.82rem;font-weight:500}
.prueba-detail{font-size:0.71rem;color:var(--muted);margin-top:3px;line-height:1.5}
.prueba-tag{display:inline-block;font-size:0.62rem;padding:2px 7px;border-radius:999px;font-weight:700;margin-right:4px;margin-top:4px}
.tag-celular{background:rgba(59,130,246,.15);color:var(--info)}
.tag-dos-disp{background:rgba(139,92,246,.15);color:#a78bfa}
.tag-pc{background:rgba(245,158,11,.15);color:var(--warn)}
.tag-cliente{background:rgba(239,68,68,.15);color:var(--danger)}
.tag-plus{background:rgba(240,184,74,.15);color:var(--accent)}
.stats{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:0.73rem;display:flex;align-items:center;gap:6px}
.stat .n{font-weight:700}
.stat .n.ok{color:var(--ok)}
.stat .n.pend{color:var(--warn)}
.btn-reset-all{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:0.73rem;cursor:pointer;margin-top:16px;display:block;margin-left:auto}
</style>
</head>

const TAGS_CONFIG = {
  'celular':   { label: '📱 Celular', clase: 'tag-celular' },
  'dos-disp':  { label: '📱📱 Dos dispositivos', clase: 'tag-dos-disp' },
  'pc':        { label: '💻 PC', clase: 'tag-pc' },
  'cliente':   { label: '🧑 Cliente real', clase: 'tag-cliente' },
  'plus':      { label: '⭐ Plus', clase: 'tag-plus' },
};

function getKey(appId, pruebaId) { return `prueba_${appId}_${pruebaId}`; }
function isDone(appId, pruebaId) { return localStorage.getItem(getKey(appId, pruebaId)) === '1'; }

function toggle(appId, pruebaId) {
  const key = getKey(appId, pruebaId);
  localStorage.setItem(key, isDone(appId, pruebaId) ? '0' : '1');
  render();
}

function render() {
  let totalDone = 0, totalAll = 0;

  const html = APPS.map(app => {
    const done = app.pruebas.filter(p => isDone(app.id, p.id)).length;
    const total = app.pruebas.length;
    totalDone += done; totalAll += total;
    const pct = Math.round((done/total)*100);
    const badgeClass = pct === 100 ? 'badge-ok' : done > 0 ? 'badge-warn' : 'badge-danger';

    const pruebasHTML = app.pruebas.map(p => {
      const done = isDone(app.id, p.id);
      const tagsHTML = (p.tags || []).map(t => {
        const cfg = TAGS_CONFIG[t] || {};
        return `<span class="prueba-tag ${cfg.clase||''}">${cfg.label||t}</span>`;
      }).join('');
      return `<div class="prueba-row ${done?'done':''}" onclick="toggle('${app.id}','${p.id}')">
        <div class="check-box">${done?'<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="#fff" stroke-width="2"/></svg>':''}</div>
        <div class="prueba-info">
          <div class="prueba-label">${p.label}</div>
          <div class="prueba-detail">${p.detail}</div>
          <div>${tagsHTML}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="app-section">
      <div class="app-head" onclick="this.closest('.app-section').querySelector('.app-body').classList.toggle('hidden');this.classList.toggle('collapsed')">
        <div class="app-title">${app.emoji} ${app.nombre} <span class="app-badge ${badgeClass}">${done}/${total}</span></div>
        <span class="chevron">▾</span>
      </div>
      <div class="app-body">${pruebasHTML}</div>
    </div>`;
  }).join('');

  document.getElementById('appList').innerHTML = html;

  const pctTotal = Math.round((totalDone/totalAll)*100);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><span class="n ok">${totalDone}</span> probadas</div>
    <div class="stat"><span class="n pend">${totalAll - totalDone}</span> pendientes</div>
    <div class="stat"><span class="n">${pctTotal}%</span> completado</div>
  `;
}

function resetAll() {
  if (!confirm('¿Reiniciar todas las pruebas?')) return;
  APPS.forEach(app => app.pruebas.forEach(p => localStorage.removeItem(getKey(app.id, p.id))));
  render();
}

window.toggle = toggle;
window.resetAll = resetAll;
render();
</script>
