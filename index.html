<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RavenTechs — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080a10;--surface:#0f1117;--surface2:#161921;
  --border:#1e2130;--text:#eef0f6;--muted:#5a6380;
  --accent:#f0b84a;--ok:#22c55e;--warn:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --font:'Inter',sans-serif;--display:'Sora',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{padding:20px 20px 0;text-align:center;margin-bottom:28px}
.brand{font-family:var(--display);font-size:1.8rem;font-weight:800;letter-spacing:-.03em}
.brand span{color:var(--accent)}
.brand-sub{font-size:0.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
.header-links{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.hlink{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);color:var(--muted);font-size:0.73rem;font-weight:600;text-decoration:none;transition:all .15s}
.hlink:hover{border-color:var(--accent);color:var(--accent)}

/* FILTROS */
.filters{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 16px;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:999px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:0.73rem;font-weight:600;cursor:pointer;transition:all .15s}
.filter-btn.on{background:var(--accent);color:#111;border-color:var(--accent)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:0 16px 60px;max-width:1200px;margin:0 auto}

/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s;cursor:pointer}
.card:hover{border-color:var(--accent)}
.card-head{padding:16px 16px 12px;display:flex;align-items:flex-start;gap:12px}
.card-emoji{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-family:var(--display);font-weight:700;font-size:1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-name span{color:var(--accent)}
.card-desc{font-size:0.73rem;color:var(--muted);margin-top:2px;line-height:1.4}
.card-status{display:flex;align-items:center;gap:5px;margin-top:6px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-ok{background:var(--ok)}
.status-warn{background:var(--warn)}
.status-danger{background:var(--danger)}
.status-info{background:var(--info)}
.status-label{font-size:0.67rem;font-weight:600;color:var(--muted)}

/* TAGS */
.card-tags{padding:0 16px 10px;display:flex;gap:5px;flex-wrap:wrap}
.tag{padding:3px 9px;border-radius:999px;font-size:0.65rem;font-weight:600;border:1px solid var(--border);color:var(--muted)}
.tag.plus{border-color:rgba(240,184,74,.3);color:var(--accent)}
.tag.offline{border-color:rgba(59,130,246,.3);color:var(--info)}
.tag.ia{border-color:rgba(139,92,246,.3);color:#a78bfa}
.tag.push{border-color:rgba(34,197,94,.3);color:var(--ok)}

/* ACCIONES */
.card-actions{padding:10px 16px 14px;display:flex;gap:7px;border-top:1px solid var(--border)}
.btn-action{flex:1;padding:8px;border-radius:10px;border:none;font-size:0.73rem;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .15s}
.btn-action:hover{opacity:.85}
.btn-app{background:linear-gradient(135deg,var(--accent),#e8a030);color:#111}
.btn-beta{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted)}
.btn-beta:hover{border-color:var(--accent);color:var(--accent)}
.btn-folleto{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted)}
.btn-folleto:hover{border-color:var(--info);color:var(--info)}
.btn-protocolo{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted)}
.btn-protocolo:hover{border-color:var(--ok);color:var(--ok)}

/* PENDIENTES */
.card-pendientes{padding:8px 16px 12px;border-top:1px solid var(--border)}
.pend-title{font-size:0.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.pend-item{display:flex;align-items:flex-start;gap:6px;font-size:0.72rem;color:var(--muted);margin-bottom:3px;line-height:1.4}
.pend-dot{width:5px;height:5px;border-radius:50%;background:var(--warn);flex-shrink:0;margin-top:5px}

/* STATS BAR */
.stats-bar{display:flex;gap:8px;padding:0 16px;margin-bottom:20px;justify-content:center;flex-wrap:wrap}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 14px;font-size:0.73rem;display:flex;align-items:center;gap:6px}
.stat-pill .n{font-weight:700;font-size:0.88rem}
.stat-pill .n.ok{color:var(--ok)}
.stat-pill .n.warn{color:var(--warn)}
.stat-pill .n.danger{color:var(--danger)}

/* EMPTY */
.empty{text-align:center;padding:40px;color:var(--muted);grid-column:1/-1}
</style>
</head>
<body>

    tags: ['plus'],

const STATUS_CONFIG = {
  operativa:  { dot: 'status-ok',     label: 'Operativa' },
  pendiente:  { dot: 'status-warn',   label: 'Con pendientes' },
  incompleta: { dot: 'status-danger', label: 'Incompleta' },
};

const CATEGORIAS = {
  comercio: ['pizzar','panar','carnear','lavar','rodix','securepro','puntoventa','empresar','centralbotar','ahorrar'],
  salud:    ['saludar','miagenda','mtc','charlar'],
  ia:       ['mtc','timbrear','legalar','centralbotar','charlar'],
};

let filtroActivo = 'todas';

function renderStats() {
  const op   = APPS.filter(a => a.estado === 'operativa').length;
  const pend = APPS.filter(a => a.estado === 'pendiente').length;
  const inc  = APPS.filter(a => a.estado === 'incompleta').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill"><span class="n ok">${op}</span> operativas</div>
    <div class="stat-pill"><span class="n warn">${pend}</span> con pendientes</div>
    <div class="stat-pill"><span class="n danger">${inc}</span> incompletas</div>
    <div class="stat-pill"><span class="n">${APPS.length}</span> total</div>`;
}

function appMatchesFiltro(app) {
  if (filtroActivo === 'todas') return true;
  if (filtroActivo === 'operativa')  return app.estado === 'operativa';
  if (filtroActivo === 'pendiente')  return app.estado === 'pendiente';
  if (filtroActivo === 'incompleta') return app.estado === 'incompleta';
  if (CATEGORIAS[filtroActivo]) return CATEGORIAS[filtroActivo].includes(app.id);
  return true;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const visibles = APPS.filter(appMatchesFiltro);

  if (!visibles.length) {
    grid.innerHTML = '<div class="empty">Sin apps en esta categoría</div>';
    return;
  }

  grid.innerHTML = visibles.map(app => {
    const st = STATUS_CONFIG[app.estado];
    const nombreHTML = app.ar
      ? `${app.nombre}<span>${app.ar}</span>`
      : app.nombre;

    const tagsHTML = app.tags.map(t => {
      const labels = { plus:'Plus', offline:'Offline', csv:'CSV', ia:'IA', push:'Push', salud:'Salud' };
      return `<span class="tag ${t}">${labels[t]||t}</span>`;
    }).join('');

    const pendHTML = app.pendientes.length
      ? `<div class="card-pendientes">
          <div class="pend-title">Pendientes</div>
          ${app.pendientes.map(p => `<div class="pend-item"><div class="pend-dot"></div>${p}</div>`).join('')}
         </div>`
      : '';

    const btnApp = app.url
      ? `<a href="${app.url}" target="_blank" class="btn-action btn-app">↗ Abrir app</a>`
      : `<span class="btn-action btn-beta" style="opacity:.4;cursor:default">↗ Sin URL</span>`;

    const btnBeta = app.beta
      ? `<a href="${app.beta}" target="_blank" class="btn-action btn-beta">β Beta</a>`
      : '';

    const btnFolleto = app.folleto
      ? `<a href="${app.folleto}" target="_blank" class="btn-action btn-folleto">📄</a>`
      : '';

    const btnProto = `<a href="/protocolo.html#${app.id}" target="_blank" class="btn-action btn-protocolo">✓</a>`;

    return `<div class="card" id="card-${app.id}">
      <div class="card-head">
        <div class="card-emoji" style="background:${app.color}22">${app.emoji}</div>
        <div class="card-info">
          <div class="card-name">${nombreHTML}</div>
          <div class="card-desc">${app.desc}</div>
          <div class="card-status">
            <div class="status-dot ${st.dot}"></div>
            <span class="status-label">${app.estadoLabel}</span>
          </div>
        </div>
      </div>
      <div class="card-tags">${tagsHTML}</div>
      ${pendHTML}
      <div class="card-actions">${btnApp}${btnBeta}${btnFolleto}${btnProto}</div>
    </div>`;
  }).join('');
}

// Filtros
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    filtroActivo = btn.dataset.filter;
    renderGrid();
  };
});

renderStats();
renderGrid();
</script>
